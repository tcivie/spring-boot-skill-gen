name: Generate Spring Boot Skills

on:
  schedule:
    # Daily at 8 AM UTC — check for new Spring Boot releases
    - cron: '0 8 * * *'
  push:
    branches: [main]
    paths:
      # Script change → bump revision for all tracked versions
      - 'generate_skill.py'
      # Manual version list edit
      - 'versions.json'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force regenerate all versions (ignore cache)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          pip install httpx
          npm ci

      - name: Detect changes and generate skills
        id: generate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 ci/generate_all.py ${{ inputs.force && '--force' || '' }}

      - name: Upload skills as release assets
        if: steps.generate.outputs.releases != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for release_info in ${{ steps.generate.outputs.releases }}; do
            version=$(echo "$release_info" | cut -d: -f1)
            tag=$(echo "$release_info" | cut -d: -f2)
            zip_file="spring-boot-${version//./-}.zip"

            # Zip the skill folder
            skill_dir="output/spring-boot-${version//./-}"
            cd output && zip -r "../$zip_file" "spring-boot-${version//./-}/" && cd ..

            # Create or update release
            if gh release view "$tag" &>/dev/null; then
              gh release upload "$tag" "$zip_file" --clobber
            else
              gh release create "$tag" "$zip_file" \
                --title "Spring Boot $version Skill" \
                --notes "Auto-generated Claude Code skill for Spring Boot $version.

          ## Install

          \`\`\`bash
          # Download and unzip
          unzip spring-boot-${version//./-}.zip -d ~/.claude/skills/
          \`\`\`

          Generated from official Spring Boot $version documentation."
            fi
          done

      - name: Commit updated versions.json
        if: steps.generate.outputs.versions_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git diff --cached --quiet || git commit -m "chore: update versions.json"
          git push
