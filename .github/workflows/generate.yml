name: Generate Spring Skills

on:
  schedule:
    # Daily at 8 AM UTC — check for new Spring releases
    - cron: '0 8 * * *'
  push:
    branches: [main]
    paths:
      - 'generate_skill.py'
      - 'skillgen/**'
      - 'versions.json'
      - 'projects.json'
      - 'compatibility.json'
      - 'templates/**'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force regenerate all versions (ignore cache)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          pip install httpx
          npm ci

      - name: Detect changes and generate skills
        id: generate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 ci/generate_all.py ${{ inputs.force && '--force' || '' }}

      - name: Upload skills as release assets
        if: steps.generate.outputs.releases != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for release_info in ${{ steps.generate.outputs.releases }}; do
            minor=$(echo "$release_info" | cut -d: -f1)
            tag=$(echo "$release_info" | cut -d: -f2)
            zip_path=$(echo "$release_info" | cut -d: -f3)
            display="${minor}.x"

            # Copy to consistent asset name
            cp "${zip_path}" "spring-best-practices.zip"

            # Delete existing release if present, then create fresh
            gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
            gh release create "$tag" "spring-best-practices.zip" \
              --title "Spring ${display} Skill" \
              --notes "Auto-generated Claude Code skill for the Spring ${display} ecosystem.

          Includes Spring Boot, Security, AI, Cloud, Modulith, and more — all at compatible versions.

          ## Install

          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/Tcivie/spring-boot-skill-gen/main/install.sh | bash -s -- ${minor}
          \`\`\`

          Generated from official Spring documentation."
          done

      - name: Commit updated versions.json
        if: steps.generate.outputs.versions_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git diff --cached --quiet || git commit -m "chore: update versions.json"
          git push
